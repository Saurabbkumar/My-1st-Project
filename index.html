<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Selection Project</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<div class="container">
    <h2>Select Boy Names</h2>
    
    <div class="select-box" onclick="toggleList()">
        Click to see 10 Names
    </div>

    <div id="nameList" class="hidden">
        <div class="name-item" onclick="printName('Rahul')">Rahul</div>
        <div class="name-item" onclick="printName('Amit')">Amit</div>
        <div class="name-item" onclick="printName('Saurabh')">Saurabh</div>
        <div class="name-item" onclick="printName('Karn')">Karn</div>
        <div class="name-item" onclick="printName('Deepak')">Deepak</div>
        <div class="name-item" onclick="printName('Vicky')">Vicky</div>
        <div class="name-item" onclick="printName('Sonu')">Sonu</div>
        <div class="name-item" onclick="printName('Rohan')">Rohan</div>
        <div class="name-item" onclick="printName('Arjun')">Arjun</div>
        <div class="name-item" onclick="printName('Vijay')">Vijay</div>
    </div>

    <h3>Selected Names:</h3>
    <table id="headCountTable">
    <thead>
        <tr class="main-header">
            <th colspan="5">MORNING TEAM HEAD COUNT</th>
        </tr>
        <tr class="sub-header">
            <th>S.NO</th>
            <th>NAME</th>
            <th>P/A/W</th>
            <th>TASK</th>
            <th>TIME</th>
        </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
</table>

<div class="summary-box">
    <p class="present-row">PRESENT: <span id="presentCount">0</span></p>
    <p class="absent-row">ABSENT: <span id="absentCount">0</span></p>
    <p class="total-row">TOTAL: <span id="totalCount">0</span></p>
</div>

<div class="action-buttons" style="margin-top: 20px; text-align: center;">
    <div class="action-buttons" style="margin-top: 20px; text-align: center; padding-bottom: 50px;">
    <button type="button" onclick="window.print()" style="background-color: #217346; color: white; padding: 15px 30px; border: none; font-weight: bold; border-radius: 8px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1);">
        🖨️ PRINT REPORT (PDF)
    </button>
</div>

<button onclick="resetTable()" style="background-color: #ff3b3b; color: white; padding: 15px 30px; border: none; font-weight: bold; border-radius: 8px; margin-left: 10px;">
    🗑️ RESET ALL
</button>

    
    <button onclick="saveAsImage()" style="background-color: #4A90E2; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; margin-left: 10px;">
        📁 Save to Gallery
    </button>
    
    <div style="text-align: center; margin: 20px;">
    <button type="button" onclick="generatePDF()" style="background-color: #217346; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        📄 DOWNLOAD AS PDF
    </button>
    
    <button type="button" onclick="generatePDF()" id="downloadPdfBtn">
    📄 DOWNLOAD AS PDF
</button>


</div>

</div>

    <div id="displayArea"></div>
</div>

    <script src="gautam.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
